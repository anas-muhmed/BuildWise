events {
    worker_connections 1024;
}

http {
    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name buildwise-dev.me www.buildwise-dev.me;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — proxy to Next.js app container
    server {
        listen 443 ssl;
        server_name buildwise-dev.me www.buildwise-dev.me;

        ssl_certificate     /etc/letsencrypt/live/buildwise-dev.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/buildwise-dev.me/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Proxy to Next.js
        location / {
            proxy_pass         http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Next.js static assets — long cache
        location /_next/static/ {
            proxy_pass       http://app:3000/_next/static/;
            proxy_set_header Host $host;
            expires          1y;
            add_header       Cache-Control "public, immutable";
        }
    }
}
